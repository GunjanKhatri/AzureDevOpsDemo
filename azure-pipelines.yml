trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =============================
# BUILD
# =============================
- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildJob

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '9.x'

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: DotNetCoreCLI@2
      displayName: Publish
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop



# =============================
# QA DEPLOYMENT
# =============================
- stage: DeployQA

  displayName: Stage-QA

  dependsOn: Build

  jobs:

  - deployment: QADeploy

    environment: QA

    strategy:
      runOnce:

        deploy:

          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1

            inputs:

              azureSubscription: 'Azure-ServiceConnection'
              appType: 'webApp'
              appName: 'AzureDevOpsEmployeeApp'

              deployToSlotOrASE: true

              resourceGroupName: 'RGAzureDevOps'

              slotName: 'staging-qa'

              package: '$(Pipeline.Workspace)/drop/**/*.zip'
# =============================
# PRODUCTION DEPLOYMENT
# =============================
- stage: DeployProduction

  displayName: Stage-Prod

  dependsOn: DeployQA

  jobs:

  - deployment: ProdDeploy

    environment: Production

    strategy:
      runOnce:
        deploy:

          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1

            inputs:

              azureSubscription: 'Azure-ServiceConnection'
              appType: 'webApp'

              appName: 'AzureDevOpsEmployeeApp'
              resourceGroupName: 'RGAzureDevOps'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
